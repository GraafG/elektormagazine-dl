name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - run: npm ci

      - name: Check for credentials in source
        run: |
          if grep -rE '(password|wachtwoord|secret|token)\s*[:=]\s*["\x27][^"\x27]{8,}' \
            --include='*.js' --include='*.json' --exclude-dir=node_modules \
            --exclude=package-lock.json .; then
            echo "::error::Possible credentials found in source files"
            exit 1
          fi

      - name: Check .env.example for real credentials
        run: |
          if grep -E '^ELEKTOR_PASSWORD=.+' .env.example | grep -vE '(your-password|example|changeme|xxx)'; then
            echo "::error::Possible real password in .env.example"
            exit 1
          fi
          if grep -E '^ELEKTOR_EMAIL=.+' .env.example | grep -vE '(example\.com|your-email|changeme|xxx)'; then
            echo "::error::Possible real email in .env.example"
            exit 1
          fi

      - name: Syntax check
        run: node --check download.js
